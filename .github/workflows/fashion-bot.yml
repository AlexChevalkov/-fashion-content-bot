name: Fashion Content Bot

on:
  schedule:
    - cron: '30 6 * * 0,1,2,3,4,6'   # 09:30 МСК (UTC+3) — все дни кроме субботы
    - cron: '30 16 * * 0,1,2,3,4,6'  # 19:30 МСК (UTC+3) — все дни кроме субботы
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Запуск бота
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python main.py

      - name: Сохранение логов
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-posts-${{ github.run_number }}
          path: generated_*.json
          retention-days: 30
